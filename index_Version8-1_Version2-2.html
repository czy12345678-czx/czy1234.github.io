<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>请假管理</title>
<style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
    body {background-color:#f5f5f5;}
    .top-bar {background:#fff;height:60px;display:flex;align-items:center;justify-content:flex-start;padding:0 16px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;gap:12px;}
    .top-bar .nav-icon {color:#3683eb;font-size:22px;}
    .top-bar .arrow {color:#ccc;font-size:18px;}
    .top-bar .title {font-size:22px;font-weight:500;color:#222;}
    .user-header {background:#fff;padding:24px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:16px;}
    .avatar-placeholder {width:48px;height:48px;border-radius:50%;background:#f5f5f5;}
    .gender-icon-img {width:32px;height:32px;display:inline-block;vertical-align:middle;}
    .user-info-texts {display:flex;flex-direction:column;gap:6px;}
    .user-name-txt {font-size:18px;color:#222;}
    .user-jobid-txt {font-size:15px;color:#888;}
    .leave-info-section {background:#fff;margin-top:12px;padding:20px 16px;position:relative;}
    .section-title {font-size:28px;font-weight:bold;color:#333;margin-bottom:20px;padding-left:8px;border-left:6px solid #3683eb;display:flex;justify-content:space-between;align-items:center;}
    .passed-stamp {
      width: 120px;
      height: 120px;
      position: relative;
      color: #b8e1d0;
      display: inline-block;
      vertical-align: middle;
      transform: rotate(15deg);
    }
    .passed-stamp::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
      border: 3px solid currentColor;
      border-radius: 50%;
      opacity: 0.8;
    }
    .passed-stamp span {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      font-weight: 500;
      padding: 4px 20px;
      background: #ffffff;
      border: 2px solid currentColor;
      opacity: 0.8;
      color: #b8e1d0;
      border-radius: 4px;
      letter-spacing:2px;
    }
    .info-item {margin-bottom:18px;font-size:26px;display:flex;align-items:center;gap:12px;}
    .info-label {color:#999;min-width:170px;}
    .info-value {color:#333;margin-left:4px;flex:1;word-break:break-word;}
    .info-value.approved {color:#3683eb;}
    .process-section {background:#fff;margin-top:12px;padding:20px 16px;}
    .process-item {position:relative;padding-left:40px;padding-bottom:40px;}
    .process-item:last-child {padding-bottom:10px;}
    .process-item::before {content:'';position:absolute;left:10px;top:24px;width:2px;height:calc(100% + 10px);background:#3683eb;}
    .process-item:last-child::before {display:none;}
    .process-check {position:absolute;left:0;top:4px;width:28px;height:28px;border-radius:50%;border:2px solid #3683eb;background:#fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
    .process-check.done {background-color:#3683eb;}
    .process-check.current {background-color:#3683eb;}
    /* layout: left column (name/status/person) and right-aligned time */
    .process-content {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:nowrap;
    }
    .process-left {display:flex;flex-direction:column;align-items:flex-start;gap:6px;flex:1;}
    .process-name {font-size:26px;color:#333;}
    .process-status {font-size:26px;color:#30bd58;margin-left:0;}
    .process-person {font-size:26px;color:#666;text-align:left;margin-top:2px;}
    .person-value {color:#333;margin-left:6px;font-size:26px;}
    .process-time {font-size:26px;color:#999;text-align:right;white-space:nowrap;}
    .location {color:#3683eb;}

    /* 右下角的隐蔽总按钮（文字“同意”） */
    .global-toggle {
      position: fixed;
      right: 16px;
      bottom: 16px;
      min-width:58px;
      height:40px;
      padding:6px 12px;
      border-radius:20px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:none;
      background: rgba(54,131,235,0.08); /* 很轻的底色 */
      color: #3683eb;
      cursor: pointer;
      opacity: 0.52; /* 更隐蔽 */
      transition: opacity .12s ease, transform .12s ease, background .12s, box-shadow .12s;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      font-size:14px;
      font-weight:500;
      z-index: 9999;
    }
    .global-toggle:hover,
    .global-toggle:focus {
      opacity: 1;
      transform: translateY(-2px);
      background: rgba(54,131,235,0.12);
      outline: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    /* 小的提示（hover 可见） */
    .global-toggle .hint {
      position:absolute;
      right:110%;
      bottom:50%;
      transform:translateY(50%);
      background:#222;color:#fff;padding:6px 8px;border-radius:6px;font-size:13px;white-space:nowrap;opacity:0;pointer-events:none;
      transition:opacity .12s;
    }
    .global-toggle:hover .hint,
    .global-toggle:focus .hint {
      opacity:1;
    }

    /* 隐藏但可被屏幕阅读器读取的文本 */
    .visually-hidden {
      position:absolute!important;
      height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px);white-space:nowrap;border:0;padding:0;margin:-1px;
    }

    .section-tools {display:flex;align-items:center;gap:8px;}
    .small-note {font-size:12px;color:#888;margin-left:8px;}

    /* 编辑态样式（仅在 contenteditable=true 时生效） */
    .info-value[contenteditable="true"],
    .person-value[contenteditable="true"],
    .process-time[contenteditable="true"],
    .process-person[contenteditable="true"] {
      outline: 2px dashed rgba(54,131,235,0.25);
      padding:6px;border-radius:4px;background:#fff;
      color: #222;
    }

    @media (max-width:820px){
      /* allow wrapping on narrow screens but keep time aligned right */
      .process-content {flex-wrap:wrap;}
      .process-time {order:3;width:100%;text-align:right;margin-top:6px;}
      .process-person {order:2;width:100%;text-align:left;}
    }

    @media (max-width:420px){
      .info-label {min-width:110px;font-size:18px;}
      .info-item {font-size:18px;gap:8px;}
      .section-title {font-size:22px;}
      .passed-stamp {width:90px;height:90px;}
      .passed-stamp span {font-size:16px;padding:2px 12px;}
      .global-toggle {right:10px;bottom:10px;min-width:50px;height:36px;font-size:13px;}
      .process-name,
      .process-status,
      .process-person,
      .person-value,
      .process-time {font-size:18px;}
    }

    /* 统一办理进度区域各字体为与上方一致 */
    .process-section .process-name,
    .process-section .process-status,
    .process-section .process-person,
    .process-section .person-value,
    .process-section .process-time,
    .process-section .person-label {
      font-size: 26px !important;
    }
    @media (max-width:420px){
      .process-section .process-name,
      .process-section .process-status,
      .process-section .process-person,
      .process-section .person-value,
      .process-section .process-time,
      .process-section .person-label {
        font-size: 18px !important;
      }
    }
</style>
</head>
<body>
<div class="top-bar">
  <span class="nav-icon location">⌖</span>
  <span class="title">首页</span>
  <span class="arrow">></span>
  <span class="title">请假管理</span>
</div>

<div class="user-header">
  <div class="avatar-placeholder"></div>
  <svg class="gender-icon-img" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="#3683eb" role="img" aria-label="性别图标"><path d="M704 192a96 96 0 1 0 0 192 96 96 0 0 0 0-192zM320 416a128 128 0 1 1 0 256 128 128 0 0 1 0-256zm384 224a128 128 0 1 0 0 256 128 128 0 0 0 0-256zM480 320h256v64H480v-64zm320 384h64v256h-64V704zM320 640h-64v256h64V640zM448 544h128v64H448v-64z"/><path d="M832 128H576V64h256a32 32 0 0 1 32 32v256h-64V128z"/></svg>
</div>

<section class="leave-info-section" aria-labelledby="leave-info-title">
  <div class="section-title" id="leave-info-title">
    <span>请假信息</span>
    <div class="section-tools">
      <div class="passed-stamp" title="审核状态">
        <span>已通过</span>
      </div>
    </div>
  </div>

  <div class="info-item" data-field="type">
    <span class="info-label">请假类型：</span>
    <span class="info-value" data-key="type">其它</span>
  </div>

  <div class="info-item" data-field="destination">
    <span class="info-label">请假去向：</span>
    <span class="info-value" data-key="destination"></span>
  </div>

  <div class="info-item" data-field="address">
    <span class="info-label">详细地址：</span>
    <span class="info-value" data-key="address"></span>
  </div>

  <div class="info-item" data-field="start">
    <span class="info-label">开始时间：</span>
    <span class="info-value" data-key="start">2026-04-24 17:00:00</span>
  </div>

  <div class="info-item" data-field="end">
    <span class="info-label">结束时间：</span>
    <span class="info-value" data-key="end">2026-04-24 22:00:00</span>                                  
  </div>

  <div class="info-item" data-field="duration">
    <span class="info-label">统计时长：</span>
    <span class="info-value" data-key="duration">天小时分钟</span>
  </div>

  <div class="info-item" data-field="contact">
    <span class="info-label">紧急联系人：</span>
    <span class="info-value" data-key="contact"></span>
  </div>

  <div class="info-item" data-field="contact_phone">
    <span class="info-label">紧急联系人电话：</span>
    <span class="info-value" data-key="contact_phone"></span>
  </div>

  <div class="info-item" data-field="reason">
    <span class="info-label">请假理由：</span>
    <span class="info-value" data-key="reason">外出与家人就餐</span>
  </div>

  <div class="info-item" data-field="status">
    <span class="info-label">请假状态：</span>
    <span class="info-value approved" data-key="status">审核通过</span>
  </div>

  <div class="info-item" data-field="cancel_status">
    <span class="info-label">销假状态：</span>
    <span class="info-value" data-key="cancel_status"></span>
  </div>

  <div class="info-item" data-field="attachments">
    <span class="info-label">请假附件：</span>
    <span class="info-value" data-key="attachments"></span>
  </div>
</section>

<!-- 右下角总按钮 -->
<button id="toggle-edit-all" class="global-toggle" aria-pressed="false" aria-label="同意" title="同意" data-mode="view">
  <span class="btn-text">同意</span>
  <span class="hint" aria-hidden="true">编辑全部</span>
  <span class="visually-hidden">同意</span>
</button>

<section class="process-section" aria-labelledby="process-title">
  <div class="section-title" id="process-title" style="border-left:6px solid #3683eb; padding-left:8px; margin-bottom:30px;">
    办理进度
  </div>

  <div class="process-item">
    <div class="process-check done">✓</div>
    <div class="process-content">
      <div class="process-left">
        <div>
          <span class="process-name">申请</span>
          <span class="process-status">申请</span>
        </div>
        <div class="process-person">
          <span class="person-label">办理人：</span>
          <span class="person-value" data-key="applicant">学生A</span>
        </div>
      </div>
      <time class="process-time" datetime="2026-04-24T16:28">2026-04-24 16:28</time>
    </div>
  </div>

  <div class="process-item">
    <div class="process-check done">✓</div>
    <div class="process-content">
      <div class="process-left">
        <div>
          <span class="process-name">辅导员审核</span>
          <span class="process-status">审核通过</span>
        </div>
        <div class="process-person">
          <span class="person-label">办理人：</span>
          <span class="person-value" data-key="counselor">辅导员B</span>
        </div>
      </div>
      <time class="process-time" datetime="2026-04-24T16:50">2026-04-24 16:50</time>
    </div>
  </div>

  <div class="process-item">
    <div class="process-check current">◉</div>
    <div class="process-content">
      <span class="process-name">结束</span>
    </div>
  </div>
</section>

<script>
  // 右下角“同意”按钮：点击进入全部编辑（包括第一、二项的办理人和时间），其他交互不变
  (function(){
    const leaveSection = document.querySelector('.leave-info-section');
    const toggleAllBtn = document.getElementById('toggle-edit-all');
    const btnText = toggleAllBtn.querySelector('.btn-text');

    // process elements to be editable: only first two items' time and person
    const processItems = Array.from(document.querySelectorAll('.process-section .process-item'));
    const editableProcessEntries = processItems.slice(0, 2); // first two

    // initial mode
    toggleAllBtn.dataset.mode = 'view';

    toggleAllBtn.addEventListener('click', function(e){
      const mode = toggleAllBtn.dataset.mode;
      if (mode === 'view') {
        enterEditAll();
      } else if (mode === 'edit') {
        saveAll();
      }
    });

    function enterEditAll() {
      // make leave info editable
      const allValueEls = leaveSection.querySelectorAll('.info-value');
      allValueEls.forEach(el => {
        el.dataset.original = el.textContent || '';
        el.contentEditable = "true";
      });

      // make process times and persons editable for first two entries
      editableProcessEntries.forEach(item => {
        const timeEl = item.querySelector('.process-time');
        if (timeEl) {
          timeEl.dataset.original = timeEl.textContent || '';
          timeEl.contentEditable = "true";
        }
        const personEl = item.querySelector('.person-value');
        if (personEl) {
          personEl.dataset.original = personEl.textContent || '';
          personEl.contentEditable = "true";
        }
      });

      toggleAllBtn.dataset.mode = 'edit';
      toggleAllBtn.setAttribute('aria-pressed','true');
      setToggleToSave();

      // focus first editable field for convenience
      const first = leaveSection.querySelector('.info-value, .process-person .person-value, .process-time');
      if (first) first.focus();
    }

    function saveAll() {
      // leave info
      const allValueEls = leaveSection.querySelectorAll('.info-value');
      allValueEls.forEach(el => {
        el.contentEditable = "false";
        delete el.dataset.original;
      });

      // process times and persons
      editableProcessEntries.forEach(item => {
        const timeEl = item.querySelector('.process-time');
        if (timeEl) {
          timeEl.contentEditable = "false";
          delete timeEl.dataset.original;
        }
        const personEl = item.querySelector('.person-value');
        if (personEl) {
          personEl.contentEditable = "false";
          delete personEl.dataset.original;
        }
      });

      toggleAllBtn.dataset.mode = 'view';
      toggleAllBtn.setAttribute('aria-pressed','false');
      setToggleToAgree();

      // TODO: 可以在这里统一提交数据到后端（collectData()）
    }

    // Esc restores originals and exits edit mode (if in edit)
    document.addEventListener('keydown', function(e){
      if (e.key === 'Escape') {
        if (toggleAllBtn.dataset.mode === 'edit') {
          // restore leave info
          leaveSection.querySelectorAll('.info-value[contenteditable="true"]').forEach(el => {
            el.textContent = el.dataset.original || '';
            el.contentEditable = "false";
            delete el.dataset.original;
          });
          // restore process fields
          editableProcessEntries.forEach(item => {
            const timeEl = item.querySelector('.process-time[contenteditable="true"]');
            if (timeEl) {
              timeEl.textContent = timeEl.dataset.original || '';
              timeEl.contentEditable = "false";
              delete timeEl.dataset.original;
            }
            const personEl = item.querySelector('.person-value[contenteditable="true"]');
            if (personEl) {
              personEl.textContent = personEl.dataset.original || '';
              personEl.contentEditable = "false";
              delete personEl.dataset.original;
            }
          });

          toggleAllBtn.dataset.mode = 'view';
          toggleAllBtn.setAttribute('aria-pressed','false');
          setToggleToAgree();
        }
      }
    });

    // Ctrl/Cmd + Enter saves all if in edit mode
    document.addEventListener('keydown', function(e){
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        if (toggleAllBtn.dataset.mode === 'edit') {
          saveAll();
        }
      }
    });

    function setToggleToSave() {
      btnText.textContent = '保存全部';
      toggleAllBtn.setAttribute('title','保存全部');
      const hint = toggleAllBtn.querySelector('.hint');
      if (hint) hint.textContent = '保存全部';
      const vis = toggleAllBtn.querySelector('.visually-hidden');
      if (vis) vis.textContent = '保存全部';
      toggleAllBtn.style.opacity = '0.95';
      toggleAllBtn.style.background = 'rgba(54,131,235,0.12)';
    }

    function setToggleToAgree() {
      btnText.textContent = '同意';
      toggleAllBtn.setAttribute('title','同意');
      const hint = toggleAllBtn.querySelector('.hint');
      if (hint) hint.textContent = '编辑全部';
      const vis = toggleAllBtn.querySelector('.visually-hidden');
      if (vis) vis.textContent = '同意';
      toggleAllBtn.style.opacity = '0.52';
      toggleAllBtn.style.background = 'rgba(54,131,235,0.08)';
    }

    // init
    setToggleToAgree();

    // helper: collect data (optional)
    function collectData() {
      const data = {};
      leaveSection.querySelectorAll('.info-value').forEach(el => {
        const key = el.dataset.key || '';
        data[key] = el.textContent.trim();
      });
      editableProcessEntries.forEach((item, idx) => {
        const timeEl = item.querySelector('.process-time');
        const personEl = item.querySelector('.person-value');
        data[`process_${idx+1}_time`] = timeEl ? timeEl.textContent.trim() : '';
        data[`process_${idx+1}_person`] = personEl ? personEl.textContent.trim() : '';
      });
      console.log('收集到的数据：', data);
      return data;
    }
  })();
</script>

</body>
</html>
